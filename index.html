<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>loopxz</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;

    background-image: url("https://raw.githubusercontent.com/loopcxz/loopcxz.github.io/main/%F0%9F%92%9D%20i%20love%20you%20more%20than%20all%20the%20stars%20in%20the%20universe%20%F0%9F%92%9D.gif");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

.container {
    text-align: center;
    z-index: 2;
}

.avatar {
    width: 100px;
    height: 100px;
    border-radius: 35px;
    overflow: hidden;
    margin: auto;
    box-shadow: 0 0 25px #fff, 0 0 60px #fff;
    animation: pulse 3s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 25px #fff, 0 0 60px #fff; }
    50% { box-shadow: 0 0 40px #fff, 0 0 100px #fff; }
    100% { box-shadow: 0 0 25px #fff, 0 0 60px #fff; }
}

.avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.title {
    font-size: 50px;
    margin-top: 5px;
    text-shadow: 0 0 5px #fff, 0 0 35px #fff;
}

.subtitle {
    margin: 10px 0;
    opacity: 0.6;
}

.highlight {
    text-shadow: 0 0 10px #fff;
}

.btn {
    margin: 5px;
    padding: 13px 25px;
    border-radius: 35px;
    border: 2px solid #fff;
    background: transparent;
    color: white;
    cursor: pointer;
    box-shadow: 0 0 30px #fff;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1) translateY(-3px);
    box-shadow: 0 0 25px #fff, 0 0 50px #fff;
}

.btn i {
    font-size: 30px;
}

.small-star {
    position: fixed;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle 2s infinite alternate;
}

.star {
    position: fixed;
    width: 12px;
    height: 12px;
    background: white;
    clip-path: polygon(
        50% 0%, 61% 35%, 98% 35%, 
        68% 57%, 79% 91%, 
        50% 70%, 21% 91%, 
        32% 57%, 2% 35%, 39% 35%
    );
    animation: twinkle 2s infinite alternate, rotateStar 6s linear infinite;
}

@keyframes twinkle {
    from { opacity: 0.2; }
    to { opacity: 1; }
}

@keyframes rotateStar {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">
    <div class="avatar">
        <img src="https://media.giphy.com/media/lK9FAxyLQXKtkU2vDR/giphy.gif">
    </div>

    <div class="title">Loopxz</div>
    <div class="subtitle">He/Him</div>

    <h2><span class="highlight">Glimpse of us</span></h2>

    <div class="stats">About me...</div>

    <div>
        <button class="btn" onclick="window.open('https://discordapp.com/users/933342549932929034')">
            <i class="fa-brands fa-discord fa-2xl" style="color: rgb(247, 246, 245);"></i>
        </button>

        <button class="btn" onclick="window.open('https://www.instagram.com/__lebaloi/')">
            <i class="fa-brands fa-instagram fa-2xl" style="color: rgb(247, 246, 245);"></i>
        </button>

        <button class="btn" onclick="window.open('https://www.youtube.com/@loopcxz')">
            <i class="fa-brands fa-youtube fa-2xl" style="color: rgb(247, 246, 245);"></i>
        </button>
    </div>
</div>

<script>

for (let i = 0; i < 50; i++) {
    let s = document.createElement("div");
    s.className = "small-star";
    s.style.top = Math.random() * 100 + "vh";
    s.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(s);
}

for (let i = 0; i < 20; i++) {
    let s = document.createElement("div");
    s.className = "star";
    s.style.top = Math.random() * 100 + "vh";
    s.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(s);
}
</script>

</body>
</html>
