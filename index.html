<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>loopxz</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;

    background: radial-gradient(circle at 50% 30%, #0a0a0a, #000 80%);
}

.container {
    text-align: center;
    z-index: 2;
}


.avatar {
    width: 150px;
    height: 150px;
    border-radius: 25px;
    overflow: hidden;
    margin: auto;
    box-shadow: 0 0 25px #fff, 0 0 60px #fff;
    animation: pulse 3s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 25px #fff, 0 0 60px #fff; }
    50% { box-shadow: 0 0 40px #fff, 0 0 100px #fff; }
    100% { box-shadow: 0 0 25px #fff, 0 0 60px #fff; }
}

.avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.title {
    font-size: 50px;
    margin-top: 25px;
    text-shadow: 0 0 15px #fff, 0 0 35px #fff;
}

.subtitle {
    margin: 10px 0;
    opacity: 0.6;
}

.highlight {
    text-shadow: 0 0 10px #fff;
}

.btn {
    margin: 8px;
    padding: 10px 25px;
    border-radius: 25px;
    border: 1px solid #fff;
    background: transparent;
    color: white;
    cursor: pointer;
    box-shadow: 0 0 10px #fff;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1) translateY(-3px);
    box-shadow: 0 0 25px #fff, 0 0 50px #fff;
}


.small-star {
    position: fixed;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle 2s infinite alternate;
}


.star {
    position: fixed;
    width: 12px;
    height: 12px;
    background: white;
    clip-path: polygon(
        50% 0%, 61% 35%, 98% 35%, 
        68% 57%, 79% 91%, 
        50% 70%, 21% 91%, 
        32% 57%, 2% 35%, 39% 35%
    );
    animation: twinkle 2s infinite alternate, rotateStar 6s linear infinite;
}

@keyframes twinkle {
    from { opacity: 0.2; }
    to { opacity: 1; }
}

@keyframes rotateStar {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}


.moon {
    position: fixed;
    top: 50px;
    right: 80px;
    width: 80px;
    height: 80px;
    background: radial-gradient(circle, #fff, #ddd);
    border-radius: 50%;
    box-shadow: 0 0 30px #fff, 0 0 80px #fff;
    z-index: 1;
}


.pixel-cat {
    position: fixed;
    bottom: 20px;
    left: 20px;
    font-family: monospace;
    font-size: 18px;
    color: #ccc;
    white-space: pre;
    z-index: 3;

    animation: catFloat 3s ease-in-out infinite;
}

.pixel-cat::after {
    content: "~";
    margin-left: 5px;
    display: inline-block;
    animation: tail 0.5s infinite alternate;
}

@keyframes catFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
}

@keyframes tail {
    from { transform: rotate(0deg); }
    to { transform: rotate(20deg); }
}
</style>
</head>

<body>

<div class="moon"></div>


<div class="pixel-cat">
 /\_/\  
( o.o ) 
 > ^ <
</div>

<div class="container">
    <div class="avatar">
        <img src="https://media.giphy.com/media/lK9FAxyLQXKtkU2vDR/giphy.gif">
    </div>

    <div class="title">Loopxz</div>
    <div class="subtitle">He/Him</div>

    <h2><span class="highlight">Glimpse of us</span></h2>

    <div class="stats">About me...</div>

    <button class="btn" onclick="window.open('https://discordapp.com/users/933342549932929034')">Discord</button>
    <button class="btn" onclick="window.open('https://www.instagram.com/__lebaloi/')">Instagram</button>
    <button class="btn" onclick="window.open('https://www.youtube.com/@loopcxz')">Youtube</button>
</div>

<script>

for (let i = 0; i < 50; i++) {
    let s = document.createElement("div");
    s.className = "small-star";
    s.style.top = Math.random() * 100 + "vh";
    s.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(s);
}


for (let i = 0; i < 20; i++) {
    let s = document.createElement("div");
    s.className = "star";
    s.style.top = Math.random() * 100 + "vh";
    s.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(s);
}
</script>

</body>
</html>
